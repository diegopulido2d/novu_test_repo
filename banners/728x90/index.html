<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="ad.size" content="width=728,height=90" />
    <title>Novu – Start Fresh | 728×90</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --color-primary: #1a1a2e;
        --color-accent: #e94560;
        --color-accent-dark: #c73652;
        --color-bg: #f5f5f0;
        --color-white: #ffffff;
        --font-primary:
          "Inter", system-ui, -apple-system, "Segoe UI", Helvetica, Arial,
          sans-serif;
        --ease-out-expo: cubic-bezier(0.19, 1, 0.22, 1);
      }

      html,
      body {
        width: 728px;
        height: 90px;
        overflow: hidden;
        background: var(--color-bg);
      }

      .banner {
        position: relative; /* ← containing block for abs children */
        width: 728px;
        height: 90px;
        overflow: hidden;
        background: var(--color-bg);
        font-family: var(--font-primary);
        outline: 1px solid #d8d8d0;
        cursor: pointer;
        display: flex;
        align-items: center;
      }

      .click-area {
        display: block;
        position: absolute;
        inset: 0;
        z-index: 10;
        text-decoration: none;
      }

      .accent-block {
        position: absolute;
        left: 0;
        top: 0;
        width: 0; /* animated to 190px */
        height: 90px;
        background: var(--color-primary);
        animation: expandRight 0.55s var(--ease-out-expo) 0.1s forwards;
        z-index: 1;
        overflow: hidden; /* clips logo during the expand animation */
      }

      @keyframes expandRight {
        from {
          width: 0;
        }
        to {
          width: 190px;
        }
      }

      .logo {
        position: absolute;
        left: 18px;
        top: 50%;
        transform: translateY(-50%);
        z-index: 2;
        opacity: 0;
        animation: fadeIn 0.4s ease 0.55s forwards;
      }

      .logo__img {
        display: block;
        height: 70px;
        width: auto;
        filter: brightness(0) invert(1);
      }

      .divider {
        position: absolute;
        left: 190px;
        top: 0;
        width: 3px;
        height: 0; /* animated to 90px */
        background: var(--color-accent);
        animation: expandDown 0.4s ease 0.55s forwards;
        z-index: 2;
      }

      @keyframes expandDown {
        from {
          height: 0;
        }
        to {
          height: 90px;
        }
      }

      .copy {
        position: absolute;
        left: 208px;
        top: 50%;
        transform: translateY(-50%);
        z-index: 2;
      }

      .headline {
        font-size: 28px;
        font-weight: 800;
        color: var(--color-primary);
        letter-spacing: -0.8px;
        line-height: 1;
        white-space: nowrap;
        opacity: 0;
        transform: translateX(-12px);
        animation: slideRight 0.5s var(--ease-out-expo) 0.7s forwards;
      }

      .headline__accent {
        color: var(--color-accent);
      }

      .subheadline {
        font-size: 13px;
        font-weight: 400;
        color: #3a3a5c;
        line-height: 1.2;
        margin-top: 3px;
        white-space: nowrap;
        opacity: 0;
        transform: translateX(-10px);
        animation: slideRight 0.5s var(--ease-out-expo) 0.85s forwards;
      }

      @keyframes slideRight {
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      .phone-wrap {
        position: absolute;
        right: 220px;
        top: 0;
        height: 90px;
        width: auto;
        z-index: 2;
        opacity: 0;
        animation: fadeIn 0.5s ease 1s forwards;
      }

      .phone-wrap__img {
        display: block;
        height: 100%; /* fills the 90px container height */
        width: auto; /* aspect-ratio preserved */
        object-fit: contain;
      }

      .cta-wrap {
        position: absolute;
        right: 22px;
        top: 50%;
        /* Initial state: off to the right */
        transform: translateY(-50%) translateX(20px);
        z-index: 2;
        opacity: 0;
        animation: slideInCTA 0.55s var(--ease-out-expo) 1.1s forwards;
      }

      @keyframes slideInCTA {
        from {
          opacity: 0;
          transform: translateY(-50%) translateX(20px);
        }
        to {
          opacity: 1;
          transform: translateY(-50%) translateX(0);
        }
      }

      .cta-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: var(--color-accent);
        color: var(--color-white);
        font-family: var(--font-primary);
        font-size: 13px;
        font-weight: 700;
        padding: 12px 22px;
        border-radius: 4px;
        text-decoration: none;
        letter-spacing: 0.1px;
        white-space: nowrap;
        /* Pulse loop after the banner settles */
        animation: ctaPulse 2s ease-in-out 2.5s infinite;
        transition:
          background-color 0.2s ease,
          transform 0.15s ease;
      }

      .click-area:hover .cta-btn {
        background-color: var(--color-accent-dark);
        transform: scale(1.04);
        animation: none;
      }

      .click-area:hover .cta-wrap {
        opacity: 1;
        transform: translateY(-50%) translateX(0);
        animation: none;
      }

      .cta-btn__arrow {
        font-size: 15px;
        transition: transform 0.2s ease;
      }

      .click-area:hover .cta-btn__arrow {
        transform: translateX(3px);
      }

      @keyframes ctaPulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.82;
        }
      }

      .accent-dots {
        position: absolute;
        right: 205px;
        top: 50%;
        transform: translateY(-50%);
        display: flex;
        flex-direction: column;
        gap: 6px;
        opacity: 0;
        animation: fadeIn 0.4s ease 1.3s forwards;
        z-index: 2;
      }

      .accent-dots span {
        display: block;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--color-accent);
        opacity: 0.35;
      }

      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }
    </style>
  </head>

  <body>
    <section
      class="banner"
      role="region"
      aria-label="Publicidad: Novu – Start Fresh. Tu mejor año comienza hoy. Empieza gratis en novuapp.com"
    >
      <!-- Dark left panel -->
      <div class="accent-block" aria-hidden="true"></div>
      <div class="divider" aria-hidden="true"></div>
      <div class="logo">
        <img
          class="logo__img"
          src="https://diegopulido2d.github.io/novu_test_repo/shared/assets/novu-logo.png"
          alt="Novu"
        />
      </div>

      <!-- Copy -->
      <div class="copy">
        <h2 class="headline">
          Start&nbsp;<span class="headline__accent">Fresh.</span>
        </h2>
        <p class="subheadline">Tu mejor año comienza hoy.</p>
      </div>

      <div class="phone-wrap" aria-hidden="true">
        <img
          class="phone-wrap__img"
          src="https://diegopulido2d.github.io/novu_test_repo/shared/assets/mockup-mobile.png"
          alt=""
        />
      </div>

      <!-- Decorative dots -->
      <div class="accent-dots" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <!-- CTA -->
      <div class="cta-wrap" aria-hidden="true">
        <span class="cta-btn">
          Empieza gratis
          <span class="cta-btn__arrow">→</span>
        </span>
      </div>

      <!-- Full-banner click target -->
      <a
        class="click-area"
        href="https://novuapp.com"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Novu – Empieza gratis en novuapp.com"
        onclick="
          var url =
            typeof clickTag !== 'undefined' && clickTag
              ? clickTag
              : 'https://novuapp.com';
          window.open(url, '_blank');
          return false;
        "
      ></a>
    </section>

    <script>
      var clickTag = "https://novuapp.com";
    </script>
  </body>
</html>
